<!doctype html>
<html lang="en">
    <!-- Template to be filled with the javascript-->
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Post</title>
        <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
        <script src="js/index.js" defer></script>
        <script src="js/send_comment.js"></script>
        <script src="js/get_comments.js"></script>
        <link rel="stylesheet" href="/style.css" />
        <link rel="stylesheet" href="/blog/style.css" />
        <link rel="stylesheet" href="style.css" />
        <script src="/js/base.js"></script>
    </head>
    <body>
        <nav>
            <a href="/"><h1>Gerro Abarabar</h1></a>
            <a href="/about">About Me</a>
            <a href="/projects">Projects</a>
            <a href="/skills">Skills</a>
            <a href="/blog">Blog</a>
            <a href="tutor">Tutoring Portfolio </a>
            <a href="/contact">Contact</a>
        </nav>
        <br />
        <div class="container">
            <h2 id="title">Post</h2>
            <img class="thumbnail" id="thumbnail" />
            <br />
            <div class="container-text" id="content-container">
                <div class="hidden" id="edit-container">
                    <button id="edit-post">Edit Post</button>
                    <form id="edit-form" class="hidden">
                        <label for="edit-title">Title:</label>
                        <input type="text" value="" id="edit-title" />
                        <br />
                        <label for="edit-content">Content:</label>
                        <textarea id="edit-content"></textarea>
                        <input
                            type="submit"
                            value="Submit"
                            id="submit-edit-post"
                        />
                    </form>
                </div>
                <p id="content">Post</p>
            </div>
        </div>

        <hr />
        <div id="comment-send">
            <form id="comment-form">
                <input
                    type="text"
                    id="comment-author"
                    placeholder="Your name"
                    required
                />
                <textarea
                    id="comment-content"
                    placeholder="Write your comment here..."
                    required
                ></textarea>
                <button type="submit">Post Comment</button>
            </form>
        </div>
        <hr />
        <div id="comment-container" class="container">
            <h3>Comments:</h3>
            <div id="comment-section"></div>
        </div>
        <hr />

        <!-- TODO: ADD RATING SECTION-->
        <footer>
            <p>&copy; 2026 Gerro Abarabar - Portfolio. All rights reserved.</p>
        </footer>
        <div id="imageLightbox" class="lightbox">
            <span class="lightbox-close">&times;</span>
            <img class="lightbox-content" id="lightboxImg" />
        </div>
    </body>
</html>
